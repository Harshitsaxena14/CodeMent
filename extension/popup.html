<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeMent - LeetCode DSA Workspace Sync</title>
  <style>
    /* CodeMent Premium Design Tokens (Linear/Raycast inspired) */
    :root {
      --bg-color: #09090b;
      --bg-card: rgba(24, 24, 27, 0.4);
      --border-color: rgba(255, 255, 255, 0.04);
      --border-glow: rgba(255, 255, 255, 0.08);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      
      --accent-cyan: #06b6d4;
      --accent-indigo: #6366f1;
      
      --difficulty-easy: #10b981;
      --difficulty-medium: #f59e0b;
      --difficulty-hard: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 20px;
      overflow-x: hidden;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Shimmer Animation */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    .shimmer {
      background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite ease-in-out;
      border-radius: 4px;
      display: inline-block;
    }

    .skeleton-title {
      width: 60%;
      height: 16px;
      margin-bottom: 8px;
    }

    .skeleton-badge {
      width: 50px;
      height: 14px;
      border-radius: 9999px;
    }

    .skeleton-text {
      width: 40%;
      height: 12px;
      margin-top: 4px;
    }

    /* Layout Elements */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-b: 1px solid var(--border-color);
      margin-bottom: 16px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-cyan);
      box-shadow: 0 0 8px var(--accent-cyan);
    }

    .status-dot.active {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    /* Content Cards */
    .content-area {
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 16px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: var(--border-glow);
    }

    .problem-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .problem-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2.5px 8px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge.easy {
      background: rgba(16, 185, 129, 0.1);
      color: var(--difficulty-easy);
      border: 1px solid rgba(16, 185, 129, 0.15);
    }

    .badge.medium {
      background: rgba(245, 158, 11, 0.1);
      color: var(--difficulty-medium);
      border: 1px solid rgba(245, 158, 11, 0.15);
    }

    .badge.hard {
      background: rgba(239, 68, 68, 0.1);
      color: var(--difficulty-hard);
      border: 1px solid rgba(239, 68, 68, 0.15);
    }

    .meta-grid {
      display: grid;
      grid-template-cols: 1fr 1fr;
      gap: 12px;
      padding-top: 12px;
      border-t: 1px solid rgba(255, 255, 255, 0.03);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-size: 9px;
      font-family: monospace;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .meta-value {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* Empty/Onboarding States */
    .onboarding-state {
      text-align: center;
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .onboarding-icon {
      width: 24px;
      height: 24px;
      color: var(--text-muted);
    }

    .onboarding-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      outline: none;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-color);
      border: none;
    }

    .btn-primary:hover {
      background: #e4e4e7;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      border-color: var(--border-glow);
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.02);
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Utility */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo-container">
      <div class="status-dot active"></div>
      <span class="logo-text">CodeMent</span>
    </div>
    <div class="sync-status">
      <span>SYNC ACTIVE</span>
    </div>
  </div>

  <!-- Content Area (Card or Onboarding) -->
  <div class="content-area">
    
    <!-- Shimmer Loader Skeleton -->
    <div id="loaderState" class="card hidden">
      <div class="problem-header">
        <div class="shimmer skeleton-title"></div>
        <div class="shimmer skeleton-badge"></div>
      </div>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="shimmer skeleton-text" style="width: 50%"></div>
          <div class="shimmer skeleton-text" style="width: 80%; height: 10px;"></div>
        </div>
        <div class="meta-item">
          <div class="shimmer skeleton-text" style="width: 50%"></div>
          <div class="shimmer skeleton-text" style="width: 70%; height: 10px;"></div>
        </div>
      </div>
    </div>

    <!-- Active Found State -->
    <div id="activeState" class="card hidden">
      <div class="problem-header">
        <span id="problemTitle" class="problem-title">Loading Problem...</span>
        <span id="difficultyBadge" class="badge easy">Easy</span>
      </div>
      <div class="meta-grid">
        <div class="meta-item">
          <span class="meta-label">Topic</span>
          <span id="topicValue" class="meta-value">-</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Pattern</span>
          <span id="patternValue" class="meta-value">-</span>
        </div>
      </div>
    </div>

    <!-- Empty/Onboarding State -->
    <div id="emptyState" class="onboarding-state">
      <svg class="onboarding-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="onboarding-text">
        Navigate to any LeetCode problem page. CodeMent will automatically extract dynamic complexity diagnostics and map curriculum connections.
      </p>
    </div>

  </div>

  <!-- Actions -->
  <div class="actions">
    <button id="openBtn" class="btn-primary" disabled>
      Open Workspace 🚀
    </button>
    <button id="askBtn" class="btn-secondary" disabled>
      Ask AI Mentor 💬
    </button>
  </div>

  <!-- Scripts -->
  <script src="problems.js"></script>
  <script src="popup.js"></script>
</body>
</html>
